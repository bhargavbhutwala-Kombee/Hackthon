global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "orderly-backend"
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ["app:8080"]
        labels:
          service: "backend"
          component: "spring-boot"
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: "nginx-frontend"
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: "frontend"
          component: "nginx"
    scrape_interval: 10s
